# One-command local stack: ARIA backend + frontend.
#   docker compose up --build
# Then open http://localhost:3000
services:
  backend:
    build: ./backend
    ports:
      - "8000:8080"
    environment:
      - ARIA_MODE=${ARIA_MODE:-demo}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - ARIA_MODEL=${ARIA_MODEL:-gemini-3-pro-preview}
      - DT_ENVIRONMENT=${DT_ENVIRONMENT:-}
      - DT_PLATFORM_TOKEN=${DT_PLATFORM_TOKEN:-}
      - PHOENIX_HOST=${PHOENIX_HOST:-https://app.phoenix.arize.com}
      - PHOENIX_API_KEY=${PHOENIX_API_KEY:-}
      - ARIA_CORS_ORIGINS=http://localhost:3000

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_ARIA_API=http://localhost:8000
    depends_on:
      - backend
